name: Test

on:
  push:
  pull_request:
  schedule:
    - cron: "0 2 * * *" # nightly at 02:00 UTC

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.7.17", "3.11.9"]

    steps:
      - uses: actions/checkout@v4

      - name: Install pyenv and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential zlib1g-dev libssl-dev libbz2-dev \
            libreadline-dev libsqlite3-dev libffi-dev liblzma-dev \
            libncurses5-dev libncursesw5-dev libgdbm-dev uuid-dev \
            curl cmake git wget

          curl https://pyenv.run | bash

      - name: Install Python
        run: |
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PYENV_ROOT/shims:$PATH"

          pyenv install -s ${{ matrix.python-version }}

      - name: Clone and build grug-tests
        run: |
          git clone https://github.com/grug-lang/grug-tests
          cd grug-tests
          git checkout main
          cmake -S . -B build
          cmake --build build

      - name: Run Pyright (Python ${{ matrix.python-version }})
        run: |
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PYENV_ROOT/shims:$PATH"

          pyenv global ${{ matrix.python-version }}
          python --version

          pip install --upgrade pip --user
          pip install pyright pytest coverage --user

          if [[ "${{ matrix.python-version }}" == "3.7.17" ]]; then
            pip install tomli importlib-metadata --user
          fi

          pip install -e .[dev]

          PY_MAJOR_MINOR=$(python - <<'EOF'
          import sys
          print(f"{sys.version_info.major}.{sys.version_info.minor}")
          EOF
          )

          pyright --pythonversion "$PY_MAJOR_MINOR"

      - name: Cache fuzz corpus
        if: matrix.python-version == '3.11.9'
        uses: actions/cache@v4
        with:
          path: minimized_corpus
          # Using run_id forces a cache save at the end of every run to capture new finds
          key: fuzz-corpus-${{ github.run_id }}
          # Fallback to the latest available corpus prefix
          restore-keys: |
            fuzz-corpus-

      - name: Fuzz
        if: matrix.python-version == '3.11.9'
        run: |
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PYENV_ROOT/shims:$HOME/.local/bin:$PATH"
          pyenv global ${{ matrix.python-version }}
          python -m pip install atheris --user

          # Prepare the source directories
          mkdir -p original_corpus
          for f in grug-tests/tests/{err,err_runtime,ok}/*/*.grug; do
            rel="${f#grug-tests/tests/}"         # strip prefix up to tests/
            new_name="${rel//\//_}"              # replace / with _
            cp "$f" "original_corpus/$new_name"
          done

          # Move existing (cached) corpus to a temporary staging area
          # If no cache was restored, we just make an empty directory
          mkdir -p staging_area
          if [ -d "minimized_corpus" ]; then
            mv minimized_corpus/* staging_area/ 2>/dev/null || true
            rm -rf minimized_corpus
          fi
          mkdir minimized_corpus

          # MERGE: Pick only the best files from staging and original tests 
          # and put them into the now-empty minimized_corpus
          chmod +x fuzz.py
          ./fuzz.py -merge=1 minimized_corpus staging_area original_corpus

          # FUZZ: Run the actual fuzzer to find new coverage
          ./fuzz.py minimized_corpus -max_len=1000 -atheris_runs=100000

          echo "New corpus size:"
          ls -1 minimized_corpus | wc -l

      - name: Generate Fuzz Coverage Report
        run: |
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PYENV_ROOT/shims:$HOME/.local/bin:$PATH"
          pyenv global ${{ matrix.python-version }}
          python -m pip install atheris --user

          coverage run fuzz.py --coverage

          coverage report -m

          # Don't let the fuzz coverage leak into the later tests coverage.
          rm -f .coverage

      - name: Run grug-tests tests (Python ${{ matrix.python-version }})
        run: |
          coverage run -m pytest --grug-tests-path=./grug-tests -s -v

      - name: Run grug-for-python tests (Python ${{ matrix.python-version }})
        run: |
          python tests.py

      - name: Report coverage (Python ${{ matrix.python-version }})
        run: |
          coverage report -m --fail-under=100

      - name: Generate coverage badge
        if: matrix.python-version == '3.11.9'
        run: |
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PYENV_ROOT/shims:$HOME/.local/bin:$PATH"
          pyenv global 3.11.9

          pip install -U coverage-badge --user

          # Generate badge
          coverage-badge -f -o .github/badges/coverage.svg

          # Configure Git for committing changes
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Commit & push only if the badge changed
          git add .github/badges/coverage.svg
          if ! git diff --cached --quiet; then
            git commit -m "Update coverage badge"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/grug-lang/grug-for-python.git HEAD:${{ github.ref_name }}
          else
            echo "No changes to coverage.svg"
          fi
